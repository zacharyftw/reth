name: Lint GitHub Actions workflows
on:
  pull_request:
    paths:
    - '.github/**'
  merge_group:
  push:
    paths:
    - '.github/**'

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: reviewdog/action-actionlint@a5524e1de28a8dfb3313e4e3e0e3aa5a42a15206 # v1.65.0
        env:
          SHELLCHECK_OPTS: "-S error"
